<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>우리반 스마트 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style id="dynamic-style">
    :root { --white: #ffffff; --black: #1a1a1a; --yellow: #ffca1b; }
    * { box-sizing: border-box; font-family: "Pretendard", sans-serif; transition: all 0.3s ease; }
    body { margin: 0; padding: 40px 60px; height: 100vh; overflow: hidden; color: var(--white); background: #0a2a63 url("wallpaper.jpg") center/cover no-repeat fixed; }
    .page { display: grid; grid-template-columns: 1.1fr 0.9fr; grid-template-rows: auto 1fr; gap: 40px; height: 100%; }
    
    .header-left { font-size: 42px; font-weight: 800; line-height: 1.3; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .header-right { text-align: right; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); position: relative; z-index: 10; }
    
    .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 30px; color: var(--black); box-shadow: 0 15px 50px rgba(0,0,0,0.4); overflow: hidden; border: none; }
    .notice-section { grid-row: 2; display: flex; flex-direction: column; }
    .tab-container { display: flex; background: #f8f9fa; padding: 12px; gap: 8px; border-bottom: 2px solid #eee; }
    .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; color: #adb5bd; font-weight: 800; cursor: pointer; border-radius: 12px; font-size: 24px; }
    .tab-btn.active { background: #0a2a63; color: white; }
    
    .notice-content { flex-grow: 1; padding: 40px; }
    .notice-input { width: 100%; height: 100%; background: transparent; border: none; outline: none; color: var(--black); font-weight: 800; resize: none; line-height: 1.6; }

    .main-right { grid-row: 2; display: flex; flex-direction: column; gap: 30px; }
    .time-wrap { text-align: right; }
    .status-line { font-weight: 950; letter-spacing: -3px; white-space: nowrap; line-height: 1.0; text-shadow: 3px 3px 8px rgba(0,0,0,0.5); }
    .status-line .accent { color: var(--yellow); margin-right: 25px; }
    .countdown { font-size: 42px; font-weight: 800; margin-top: 15px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
    
    .meal-card { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
    .meal-title { font-size: 52px; font-weight: 900; margin-bottom: 30px; color: #0a2a63; border-bottom: 5px solid var(--yellow); }
    .meal-list { font-size: 34px; font-weight: 800; line-height: 1.8; text-align: center; color: #333; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header-left" id="headerTexts">데이터 로딩 중...</div>
    <div class="header-right" id="dateText"></div>

    <section class="glass-card notice-section">
      <div class="tab-container" id="tabs">
        <button class="tab-btn" id="btn-morning" onclick="selectTab('morning')">아침활동</button>
        <button class="tab-btn" id="btn-class" onclick="selectTab('class')">수업시간</button>
        <button class="tab-btn" id="btn-break" onclick="selectTab('break')">쉬는시간</button>
        <button class="tab-btn" id="btn-lunch" onclick="selectTab('lunch')">점심시간</button>
      </div>
      <div class="notice-content">
        <textarea id="noticeInput" class="notice-input"></textarea>
      </div>
    </section>

    <div class="main-right">
      <div class="time-wrap">
        <div class="status-line" id="statusLine"></div>
        <div id="countdownText" class="countdown"></div>
      </div>
      <section class="glass-card meal-card">
        <div class="meal-title">오늘의 급식 🍱</div>
        <div id="mealList" class="meal-list">식단을 가져오는 중...</div>
      </section>
    </div>
  </div>

  <script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQidILWyuflvuPJcl_yZGj5nAs6fVNaWXGUQAwzycSegpqo7UuHhEYYQIjOzRam-w8b2-yao3YmIYxi/pub?output=csv"; 

    let currentTab = "morning";
    let sheetConfig = {};

    async function loadSheetData() {
      try {
        const response = await fetch(SHEET_CSV_URL);
        const data = await response.text();
        const rows = data.split('\n').map(row => row.split(','));

        // 1. 상단 텍스트 연동 (시트 위치에 맞춰 조정 필요)
        // 시트 9행, 10행의 7열(G열) 근처라고 가정
        document.getElementById('headerTexts').innerHTML = `${rows[8][6] || '우리가 만난지 n일째'}<br>${rows[9][6] || '방학까지 n일'}`;

        // 2. 디자인 설정값 연동 (임의의 위치 설정 - 추후 시트에서 확정 필요)
        const noticeSize = rows[2][1] || 48; // B3
        const dateSize = rows[3][1] || 56;   // B4
        const timeSize = rows[4][1] || 115;  // B5
        const spacing = rows[5][1] || -40;   // B6
        const opacity = rows[6][1] || 0.95;  // B7
        const accent = rows[7][1] || '#ffca1b'; // B8

        // 스타일 즉시 적용
        document.getElementById('noticeInput').style.fontSize = noticeSize + "px";
        document.getElementById('dateText').style.fontSize = dateSize + "px";
        document.getElementById('dateText').style.marginBottom = spacing + "px";
        document.getElementById('statusLine').style.fontSize = timeSize + "px";
        document.querySelector('.time-wrap').style.marginTop = (parseInt(spacing) - 10) + "px";
        document.querySelectorAll('.glass-card').forEach(c => c.style.background = `rgba(255,255,255,${opacity})`);
        document.documentElement.style.setProperty('--yellow', accent);

      } catch (e) { console.error("데이터 로드 실패:", e); }
    }

    function selectTab(type) {
      currentTab = type;
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.id === `btn-${type}`);
      });
      // 여기에 시트의 '안내사항' 탭 내용을 불러오는 로직을 추가할 수 있습니다.
    }

    function updateTime() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const displayH = h % 12 || 12;
      const displayM = m < 10 ? '0' + m : m;
      
      document.getElementById('dateText').innerText = `${now.getFullYear()}년 ${now.getMonth() + 1}월 ${now.getDate()}일`;
      document.getElementById('statusLine').innerHTML = `<span class="accent">현재</span> ${displayH}시 ${displayM}분`;
    }

    // 초기 실행 및 주기적 업데이트
    loadSheetData();
    updateTime();
    setInterval(updateTime, 1000);
    setInterval(loadSheetData, 60000); // 1분마다 시트 동기화
  </script>
</body>
</html>
