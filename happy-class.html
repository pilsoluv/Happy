<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>우리반 스마트 대시보드</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <style>
    :root { --white: #ffffff; --black: #1a1a1a; --yellow: #ffca1b; }
    * { box-sizing: border-box; font-family: "Pretendard", sans-serif; transition: all 0.3s ease; }
    body { margin: 0; padding: 40px 60px; height: 100vh; overflow: hidden; color: var(--white); background: #0a2a63 url("wallpaper.jpg") center/cover no-repeat; }
    .page { display: grid; grid-template-columns: 1.1fr 0.9fr; grid-template-rows: auto 1fr; gap: 40px; height: 100%; }
    
    /* 헤더 영역 */
    .header-left { font-size: 42px; font-weight: 800; line-height: 1.3; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    .header-right { text-align: right; font-size: 56px; font-weight: 900; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
    
    /* 안내사항 카드 */
    .glass-card { background: rgba(255, 255, 255, 0.95); border-radius: 30px; color: var(--black); box-shadow: 0 15px 50px rgba(0,0,0,0.4); overflow: hidden; }
    .tab-container { display: flex; background: #f8f9fa; padding: 12px; gap: 8px; border-bottom: 2px solid #eee; }
    .tab-btn { flex: 1; padding: 15px; border: none; background: transparent; color: #adb5bd; font-weight: 800; cursor: pointer; border-radius: 12px; font-size: 24px; }
    .tab-btn.active { background: #0a2a63; color: white; }
    .notice-content { padding: 40px; height: calc(100% - 80px); }
    .notice-text { width: 100%; height: 100%; border: none; outline: none; font-weight: 800; resize: none; line-height: 1.6; font-size: 48px; background: transparent; }

    /* 시간 및 급식 영역 */
    .main-right { display: flex; flex-direction: column; gap: 30px; }
    .time-wrap { text-align: right; margin-top: -30px; }
    .status-line { font-size: 115px; font-weight: 950; line-height: 1.0; }
    .status-line .accent { color: var(--yellow); margin-right: 20px; }
    .countdown { font-size: 42px; font-weight: 800; margin-top: 10px; }
    .meal-card { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="header-left" id="headerTexts">로딩 중...</div>
    <div class="header-right" id="dateText"></div>

    <section class="glass-card">
      <div class="tab-container" id="tabs">
        <button class="tab-btn" id="btn-morning" onclick="changeTab('morning')">아침활동</button>
        <button class="tab-btn" id="btn-class" onclick="changeTab('class')">수업시간</button>
        <button class="tab-btn" id="btn-break
